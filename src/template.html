<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="To Do List">
    <meta name="keywords" content="Squeshly-Freezed, to-do, to-do-list, to do, to do list">
    <title>to-do-list</title>
</head>

<body>

    <div class="main-container">


        <div class="ledger">
            <h1 class="heading">TO-DO
                <div class="button-wrapper">
                    <button class="button-add">ADD</button>
                </div>
            </h1>
            <div class="ledger-inner">
                <div class="side-bar"></div>
                <div class="main-bar"></div>
            </div>
        </div>


        <dialog class="modal">
            <h1 class="heading">CREATE...
                <div class="button-wrapper">
                    <button class="button-add">GO!</button>
                </div>
            </h1>
            <div class="ledger-inner">
                <div class="side-bar">
                    <button class="button-add-todo" autofocus>TO DO</button>
                    <button class="button-add-project">PROJECT</button>
                    <button class="button-add-note">NOTE</button>
                </div>
                <div class="main-bar"></div>
            </div>
        </dialog>


        <div class="footer">
            <p>Copyright © 2026 <a href="https://github.com/Squeshly-Freezed" title="Rob's GitHub">Squeshly-Freezed</a></p>
            <img class="logo" src="./src/img/squeshly-freezed-v2-transparent.png" alt="Squeshly-Freezed">
        </div>


    </div>

</body>
</html>
